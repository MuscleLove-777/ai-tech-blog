name: Auto Generate Article & Deploy

on:
  schedule:
    # 毎日 日本時間 9:00 (UTC 0:00)
    - cron: '0 0 * * *'
    # 毎日 日本時間 15:00 (UTC 6:00)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # -------------------------------------------------------
      # 1. リポジトリをチェックアウト
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # -------------------------------------------------------
      # 2. Python環境セットアップ
      # -------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      # -------------------------------------------------------
      # 3. 依存パッケージインストール
      # -------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------------------------------
      # 4. 記事生成 & サイトビルド
      # -------------------------------------------------------
      - name: Generate article and build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python generate_and_build.py

      # -------------------------------------------------------
      # 5. .nojekyll ファイルを配置
      # -------------------------------------------------------
      - name: Add .nojekyll
        run: |
          touch output/site/.nojekyll

      # -------------------------------------------------------
      # 6. 生成した記事JSONをリポジトリにcommit & push
      # -------------------------------------------------------
      - name: Commit and push article JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/articles/
          # 変更がある場合のみコミット
          if git diff --cached --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "auto: add generated article $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      # -------------------------------------------------------
      # 7. GitHub Pages用にアーティファクトをアップロード
      # -------------------------------------------------------
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: output/site

      # -------------------------------------------------------
      # 8. GitHub Pagesにデプロイ
      # -------------------------------------------------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
